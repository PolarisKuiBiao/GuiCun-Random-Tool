<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>鬼村神秘小工具1.0</title>
    <style>
        body { font-family: sans-serif; max-width: 900px; margin: 20px auto; padding: 0 10px; }
        hr { margin: 30px 0; }
        .section { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; }
        input, button { font-size: 16px; padding: 6px; margin: 5px 0; }
        .result { background: #eee; padding: 10px; margin-top: 10px; font-weight: bold; }
        .assignment-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px 15px;
            margin-top: 10px;
        }
        .assignment-item {
            border-bottom: 1px dotted #aaa;
            padding: 4px 0;
        }
        footer {
            margin-top: 30px;
            text-align: center;
            color: #777;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h2>🎲 鬼村神秘小工具1.0</h2>

    <!-- 功能1：随机数生成器 -->
    <div class="section">
        <h3>1. 随机数</h3>
        <label>最小值: <input type="number" id="minNum" value="1"></label>
        <label>最大值: <input type="number" id="maxNum" value="100"></label>
        <button id="genNumber">生成随机数</button>
        <div class="result" id="numResult">—</div>
    </div>

    <!-- 功能2：15人身份分配（编号1～15，固定配置） -->
    <div class="section">
        <h3>2. 15人身份分配</h3>
        <p><strong>配置：</strong> 4普通村民 · 4吸血鬼 · 长老 · 预言家 · 女巫 · 守护者 · 猎人 · 丘比特 · 吹笛人</p>
        <button id="assignBtn">🎲 随机分配身份</button>
        <div id="assignmentResult" class="result" style="font-weight: normal; background: #f9f9f9;">
            <div class="small" style="color: #888;">点击按钮生成分配</div>
        </div>
    </div>

    <!-- 底部提供者信息 -->
    <footer>
        © 2025 鬼村随机工具 · 由 <span id="provider">顾九曜</span> 提供
    </footer>

    <script>
        (function() {
            // ---------- 功能1：随机数 ----------
            const minInput = document.getElementById('minNum');
            const maxInput = document.getElementById('maxNum');
            const genBtn = document.getElementById('genNumber');
            const numRes = document.getElementById('numResult');

            genBtn.addEventListener('click', function() {
                let min = parseInt(minInput.value, 10);
                let max = parseInt(maxInput.value, 10);
                if (isNaN(min)) min = 1;
                if (isNaN(max)) max = 100;
                if (min > max) [min, max] = [max, min];

                const rand = Math.floor(Math.random() * (max - min + 1)) + min;
                numRes.textContent = rand;
            });

            // ---------- 功能2：15人固定身份分配 ----------
            const assignBtn = document.getElementById('assignBtn');
            const assignmentDiv = document.getElementById('assignmentResult');

            // 固定身份池（4村民、4吸血鬼、长老、预言家、女巫、守护者、猎人、丘比特、吹笛人）
            const ROLE_POOL = [
                '普通村民', '普通村民', '普通村民', '普通村民',
                '吸血鬼', '吸血鬼', '吸血鬼', '吸血鬼',
                '长老', '预言家', '女巫', '守护者', '猎人', '丘比特', '吹笛人'
            ];

            // 打乱数组
            function shuffleArray(arr) {
                const a = [...arr];
                for (let i = a.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [a[i], a[j]] = [a[j], a[i]];
                }
                return a;
            }

            function generateAssignment() {
                const shuffled = shuffleArray(ROLE_POOL);
                let html = '<div class="assignment-grid">';
                for (let i = 0; i < 15; i++) {
                    html += `<div class="assignment-item"><strong>${i+1}号</strong>：${shuffled[i]}</div>`;
                }
                html += '</div>';
                assignmentDiv.innerHTML = html;
            }

            assignBtn.addEventListener('click', generateAssignment);
            generateAssignment(); // 页面加载时自动生成一次
        })();
    </script>
</body>
</html>
